{% extends "base.html" %}
{% block title %}Edit Product{% endblock %}
{% block content %}
<h2>Edit Product: {{ product.name }}</h2>
<form method="POST" action="{{ url_for('edit_product', product_id=product.product_id) }}" class="product-form">
    <div class="form-group">
        <label for="name">Product Name *</label>
        <input type="text" name="name" id="name" value="{{ product.name }}" required>
    </div>
    <div class="form-group">
        <label for="description">Description</label>
        <textarea name="description" id="description" rows="4">{{ product.description }}</textarea>
    </div>
    <div class="form-group">
        <label for="category">Category *</label>
        <input type="text" name="category" id="category" value="{{ product.category }}" required>
    </div>
    <div class="form-group">
        <label for="price">Price *</label>
        <input type="number" name="price" id="price" step="any" min="0.01" value="{{ product.price }}" required>
    </div>
    <div class="form-group">
        <label for="stock_quantity">Stock Quantity</label>
        <input type="number" name="stock_quantity" id="stock_quantity" min="0" value="{{ product.stock_quantity }}">
    </div>
    <div class="form-group">
        <label for="image_url">Image URL</label>
        <input type="url" name="image_url" id="image_url" value="{{ product.image_url }}" placeholder="https://example.com/image.jpg">
    </div>
    <button type="submit" class="btn">Update Product</button>
    <a href="{{ url_for('product_detail', product_id=product.product_id) }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
